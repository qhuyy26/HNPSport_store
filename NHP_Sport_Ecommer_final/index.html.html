        // --- Lightweight Cart Context (localStorage persisted)
        const CartContext = React.createContext({});

        const CartProvider = ({ children }) => {
            const [items, setItems] = useState(() => {
                try {
                    const raw = localStorage.getItem('hnp_cart');
                    return raw ? JSON.parse(raw) : {};
                } catch (e) {
                    return {};
                }
            });

            useEffect(() => {
                localStorage.setItem('hnp_cart', JSON.stringify(items));
            }, [items]);

            const addToCart = useCallback((productId, qty = 1) => {
                setItems(prev => {
                    const next = { ...prev };
                    next[productId] = (next[productId] || 0) + qty;
                    return next;
                });
            }, []);

            const removeFromCart = useCallback((productId, qty = 1) => {
                setItems(prev => {
                    const next = { ...prev };
                    if (!next[productId]) return prev;
                    next[productId] = next[productId] - qty;
                    if (next[productId] <= 0) delete next[productId];
                    return next;
                });
            }, []);

            const setQuantity = useCallback((productId, quantity) => {
                setItems(prev => {
                    const next = { ...prev };
                    if (!quantity || quantity <= 0) {
                        delete next[productId];
                    } else {
                        next[productId] = quantity;
                    }
                    return next;
                });
            }, []);

            const clearCart = useCallback(() => setItems({}), []);

            const count = Object.values(items).reduce((s, v) => s + v, 0);

            const value = useMemo(() => ({ items, addToCart, removeFromCart, setQuantity, clearCart, count }), [items, addToCart, removeFromCart, setQuantity, clearCart, count]);

            return (
                <CartContext.Provider value={value}>
                    {children}
                </CartContext.Provider>
            );
        };

                        </div>

                        <aside className="space-y-6">
                            <div className="bg-surface-container-low p-6 rounded-2xl border border-outline-variant/30">
                                <h4 className="font-bold mb-2">Tóm tắt đơn hàng</h4>
                                <div className="flex justify-between"><span>Tạm tính</span><span>{subtotal.toLocaleString('vi-VN')}đ</span></div>
                                <div className="flex justify-between mt-2"><span>Phí vận chuyển</span><span>{shipping === 'standard' ? '50.000đ' : '120.000đ'}</span></div>
                                <div className="flex justify-between mt-2"><span>Chiết khấu</span><span>{discount ? `${(discount*100).toFixed(0)}%` : '0'}</span></div>
                                <div className="border-t mt-4 pt-4 flex justify-between font-bold">Tổng cộng <span>{(subtotal - subtotal * discount + (shipping === 'standard' ? 50000 : 120000)).toLocaleString('vi-VN')}đ</span></div>
                            </div>
                        </aside>
                    </div>
                    <Footer />
                </main>
            );
        };

        // --- App Wrapper ---

        const App = () => {
            const location = useLocation();

            // Scroll to top on route change
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [location]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Only show Navbar if not on login or register page */}
                    {location.pathname !== '/login' && location.pathname !== '/register' && <Navbar />}
                    <div className="flex-grow">
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/about" element={<AboutPage />} />
                            <Route path="/register" element={<RegisterPage />} />
                            <Route path="/product/:id" element={<ProductDetail />} />
                            <Route path="/chitietbaiviet/:id" element={<ArticleDetailPage />} />
                            <Route path="/blog" element={<BlogPage />} />
                            <Route path="/products" element={<ProductsPage />} />
                            <Route path="/cart" element={<CartPage />} />
                            <Route path="/promotions" element={<PromotionsPage />} />
                            <Route path="/contact" element={<ContactPage />} />
                            <Route path="/login" element={<LoginPage />} />
                        </Routes>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(
            <MemoryRouter>
                <CartProvider>
                    <App />
                </CartProvider>
            </MemoryRouter>
        );
    </script>
</body>
</html>
